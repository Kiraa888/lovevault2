  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // CONFIGURATION
    // ==========================================
    const CONFIG = {
      myName: 'Animesh',
      herName: 'Mandira',
      anniversaryDate: '2026-09-23T19:00:00',
      startDate: '2019-09-23T00:00:00',
      
      celebrationVenue: 'Tution, Raghunathpur',
      celebrationPlan: 'A private Lunch, just you and me.',
      
      events: [
        {
          title: 'The Celebration',
          date: '23 September 2026',
          time: '9:00 AM',
          venue: 'Tution, Raghunathpur',
          plan: 'A Beautiful private time juat you and me.',
          image: 'https://iili.io/CacLOxe.png',
          link: '#'
        },
        {
          title: 'Lunch Together',
          date: '24 - 26 September 2026',
          time: '10:00 AM',
          venue: 'Our Favorite Restaurant',
          plan: 'A cozy, quiet romantic Lunch to continue our beautiful moments.',
          image: 'https://iili.io/Cac6fQj.png',
          link: '#'
        }
      ],

      images: {
        hero1: 'https://iili.io/CaaEizb.png',
        // hero2 removed
        story1: 'https://iili.io/B7X6OZX.png',
        story2: 'https://iili.io/qZjXvR4.jpg',
        story3: 'https://iili.io/qQ9P7ov.png',
        story4: 'https://iili.io/q0QEQWJ.jpg',
        gallery: [
          'https://iili.io/qyQaa8Q.jpg',
          'https://iili.io/qZjXvR4.jpg',
          'https://iili.io/BT6Ra19.jpg',
          'https://iili.io/B5aHwW7.jpg',
          'https://iili.io/BT6hPGn.jpg',
          'https://iili.io/B58FZog.png',
        ],
        restaurant: '',
        venuePlace: '',
        herHouse: '',
        yourHouse: '',
        loveLetter: 'https://iili.io/CaRZksR.png',
      }
    };

    // ==========================================
    // HOOKS
    // ==========================================
    const useInView = (options = {}) => {
      const ref = useRef(null);
      const [isInView, setIsInView] = useState(false);
      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) { setIsInView(true); observer.unobserve(entry.target); }
        }, { threshold: 0.12, ...options });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      return [ref, isInView];
    };

    const useCountdown = (targetDate) => {
      const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0, isComplete: false });
      const [changingFields, setChangingFields] = useState({ days: false, hours: false, minutes: false, seconds: false });
      useEffect(() => {
        const calculate = () => {
          const diff = new Date(targetDate) - new Date();
          if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, isComplete: true };
          return { days: Math.floor(diff/(1000*60*60*24)), hours: Math.floor((diff/(1000*60*60))%24), minutes: Math.floor((diff/(1000*60))%60), seconds: Math.floor((diff/1000)%60), isComplete: false };
        };
        const update = () => {
          const nt = calculate();
          setTimeLeft(prev => {
            const ch = {};
            if(prev.days!==nt.days) ch.days=true;
            if(prev.hours!==nt.hours) ch.hours=true;
            if(prev.minutes!==nt.minutes) ch.minutes=true;
            if(prev.seconds!==nt.seconds) ch.seconds=true;
            if(Object.keys(ch).length>0){ setChangingFields(p=>({...p,...ch})); setTimeout(()=>setChangingFields(p=>({...p,...Object.fromEntries(Object.keys(ch).map(k=>[k,false]))})),550); }
            return nt;
          });
        };
        update();
        const iv = setInterval(update, 1000);
        return () => clearInterval(iv);
      }, [targetDate]);
      return { ...timeLeft, changingFields };
    };

    const useLoveCounter = (startDate) => {
      const [tt, setTt] = useState({ years:0, months:0, days:0, hours:0 });
      useEffect(() => {
        const calc = () => {
          const s=new Date(startDate), n=new Date();
          let y=n.getFullYear()-s.getFullYear(), m=n.getMonth()-s.getMonth(), d=n.getDate()-s.getDate(), h=n.getHours()-s.getHours();
          if(d<0){m--;d+=30} if(m<0){y--;m+=12} if(h<0){d--;h+=24}
          return {years:y,months:m,days:d,hours:h};
        };
        setTt(calc());
        const iv=setInterval(()=>setTt(calc()),1000*60*60);
        return ()=>clearInterval(iv);
      }, [startDate]);
      return tt;
    };

    const useCountUp = (target, isActive, duration=1500) => {
      const [count, setCount] = useState(0);
      useEffect(() => {
        if(!isActive) return;
        if(target===0){setCount(0);return}
        let st=null, af;
        const step=(ts)=>{
          if(!st) st=ts;
          const p=Math.min((ts-st)/duration,1);
          const e=1-Math.pow(1-p,3);
          setCount(Math.floor(e*target));
          if(p<1) af=requestAnimationFrame(step); else setCount(target);
        };
        af=requestAnimationFrame(step);
        return ()=>{if(af) cancelAnimationFrame(af)};
      }, [target,isActive,duration]);
      return count;
    };

    // ==========================================
    // COMPONENTS
    // ==========================================
    const FloatingParticles = () => {
      const [particles] = useState(()=>Array.from({length:12},(_,i)=>({id:i,left:`${Math.random()*100}%`,size:Math.random()*16+8,duration:Math.random()*10+15,delay:Math.random()*10,type:['🌸','💖','✨','💫','🌹'][Math.floor(Math.random()*5)]})));
      return (<div className="fixed inset-0 pointer-events-none overflow-hidden z-0">{particles.map(p=>(<div key={p.id} className="particle text-pink-light/30" style={{left:p.left,fontSize:p.size,animation:`particleDrift ${p.duration}s linear ${p.delay}s infinite`}}>{p.type}</div>))}</div>);
    };

    const PlaceholderImg = ({ src, alt, className, aspect, label, eager }) => {
      if (!src) return (<div className={`bg-beige border-2 border-chocolate/40 border-dashed rounded-lg flex flex-col items-center justify-center ${className}`} style={{aspectRatio:aspect||'3/4'}}><div className="text-wood/50 font-serif text-center p-4"><div className="text-chocolate text-3xl mb-2">📷</div><div className="text-sm font-medium">{label||'Photo'}</div></div></div>);
      return <img src={src} alt={alt} className={`object-cover ${className}`} loading={eager ? "eager" : "lazy"} fetchpriority={eager ? "high" : "auto"} />;
    };

    // ==========================================
    // HERO SECTION (second hero image removed)
    // ==========================================
    const Hero = () => {
      const [introActive, setIntroActive] = useState(true);
      const [contentVisible, setContentVisible] = useState(false);

      useEffect(() => {
        const contentTimer = setTimeout(() => setContentVisible(true), 50);
        const introTimer = setTimeout(() => setIntroActive(false), 1800);
        return () => { clearTimeout(contentTimer); clearTimeout(introTimer); };
      }, []);

      const scrollToCountdown = () => document.getElementById('countdown')?.scrollIntoView({ behavior: 'smooth' });

      return (
        <section id="home" className="relative min-h-screen flex items-center justify-center bg-beige-light overflow-hidden">
          <div className="absolute inset-0 bg-gradient-to-b from-beige-light via-beige to-beige-dark opacity-50" />
          <div className="absolute top-20 left-10 text-pink-light/20 text-6xl animate-float-slow">🌹</div>
          <div className="absolute bottom-40 right-20 text-chocolate/20 text-5xl animate-float" style={{ animationDelay: '2s' }}>💖</div>

                <div className={`gold-corner top-left ${inView?'opacity-60':'opacity-0'}`} />
                <div className={`gold-corner top-right ${inView?'opacity-60':'opacity-0'}`} />
                <div className={`gold-corner bottom-left ${inView?'opacity-60':'opacity-0'}`} />
                <div className={`gold-corner bottom-right ${inView?'opacity-60':'opacity-0'}`} />
                
                <div className="relative z-10 space-y-10 md:space-y-14">
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 sm:gap-12">
                    <div className="text-center sm:text-left">
                      <span className="text-chocolate/70 uppercase tracking-[0.25em] text-[10px] font-serif block mb-3">Hosted By</span>
                      <h3 className="font-script text-3xl sm:text-4xl md:text-5xl text-wood mb-2">{CONFIG.myName}</h3>
                    </div>
                    <div className="text-center sm:text-right">
                      <span className="text-chocolate/70 uppercase tracking-[0.25em] text-[10px] font-serif block mb-3">Honouring</span>
                      <h3 className="font-script text-3xl sm:text-4xl md:text-5xl text-wood mb-2">{CONFIG.herName}</h3>
                    </div>
                  </div>
                  
                  <div className="section-ornament"><div className="section-ornament-icon" /></div>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-8 lg:gap-12">
                    {CONFIG.events.map((event, index) => (
                      <div key={index} className="flex flex-col text-center space-y-5 group">
                        <div className="w-full aspect-[4/3] rounded-2xl overflow-hidden border-2 border-chocolate/20 shadow-xl shadow-wood/5 relative">
                          <img src={event.image} alt={event.venue} className="w-full h-full object-cover transition-transform duration-700 ease-out group-hover:scale-105" />
                          <div className="absolute inset-0 bg-wood/10 pointer-events-none transition-opacity duration-500 group-hover:opacity-0" />
                        </div>
                        
                        <div className="space-y-4 pt-2">
                          <span className="text-chocolate/80 uppercase tracking-[0.25em] text-[10px] font-serif border-b border-chocolate/20 pb-2 inline-block px-4">{event.title}</span>
                          
                          <div className="flex flex-col items-center gap-2">
                            <div className="flex items-center gap-2">
                              <svg className="w-4 h-4 text-chocolate/60 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                              <p className="font-serif text-lg sm:text-xl text-wood font-medium">{event.date}</p>
                            </div>
                            <div className="flex items-center gap-2">
                              <svg className="w-4 h-4 text-chocolate/60 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                              <p className="font-serif text-base sm:text-lg text-wood">{event.time}</p>
                            </div>
                          </div>
                          
                          <div>
                            <p className="font-serif text-lg sm:text-xl text-wood font-medium px-2">{event.venue}</p>
                            <p className="font-body text-wood-light/70 text-sm mt-2 max-w-[280px] mx-auto leading-relaxed">{event.plan}</p>
                          </div>
                          
                          <div className="pt-3">
                            <a href={event.link} className="location-btn" onClick={e=>e.preventDefault()}>
                              <svg className="w-4 h-4 text-chocolate" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6 3m-6-3V7m6 10l5.447 2.724A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4" /></svg>
                              View Location
                            </a>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="section-ornament"><div className="section-ornament-icon" /></div>
                  
                  <div className="text-center space-y-5">
                    <span className="text-chocolate/70 uppercase tracking-[0.25em] text-[10px] font-serif block">DayCelebration</span>
                    <div className="inline-block text-left space-y-3">
                      {eveningItems.map((item,i)=>(
                        <div key={i} className="timeline-bullet">
                          <span className="font-body text-wood-light text-sm sm:text-base">{item}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  
                  <div className="section-ornament"><div className="section-ornament-icon" /></div>
                  
                  <div className="dress-code-box mx-auto max-w-sm">
                    <span className="text-chocolate/70 uppercase tracking-[0.25em] text-[10px] font-serif block mb-3">Dress Code</span>
                    <p className="font-serif italic text-wood-light text-sm sm:text-base leading-relaxed">Bring your beautiful smile.<br />Everything else is already perfect.</p>
                  </div>
                  
                  <div className="text-center space-y-4 pt-2">
                    <p className="font-serif text-lg sm:text-xl md:text-2xl text-wood italic leading-relaxed">Your Presence Will Make This Celebration Complete</p>
                    <div className="w-16 h-px bg-gradient-to-r from-transparent via-chocolate/50 to-transparent mx-auto" />
                    <p className="font-body text-wood-light/70 italic text-xs sm:text-sm max-w-sm mx-auto leading-relaxed">"The most precious gift is celebrating this beautiful journey together."</p>
                    <div className="pt-2">
                      <span className="inline-block text-chocolate text-lg animate-heartbeat">❤️</span>
                    </div>
                  </div>
                  
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    };

    // ==========================================
    // GALLERY SECTION
    // ==========================================
    const Gallery = () => {
      const [ref, inView] = useInView();
      const [lightbox, setLightbox] = useState(null);
      const images = CONFIG.images.gallery;
      return (<section id="gallery" className="py-24 bg-beige-light relative" ref={ref}><div className="max-w-7xl mx-auto px-6"><div className={`text-center mb-16 transition-all duration-1000 ${inView?'opacity-100 translate-y-0':'opacity-0 translate-y-8'}`}><span className="text-chocolate uppercase tracking-[0.3em] text-xs font-serif block mb-4">Captured Forever</span><h2 className="font-serif text-4xl md:text-5xl text-wood italic">Moments With You</h2><div className="w-16 h-px bg-chocolate mx-auto mt-6" /></div><div className="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">{images.map((img,i)=>(<div key={i} className={`break-inside-avoid transition-all duration-700 ${inView?'opacity-100 translate-y-0':'opacity-0 translate-y-8'}`} style={{transitionDelay:`${i*100}ms`}}><div className="group relative rounded-xl overflow-hidden shadow-lg shadow-wood/10 cursor-pointer img-zoom-container border border-chocolate/10" onClick={()=>setLightbox(img)}><PlaceholderImg src={img} alt={`Memory ${i+1}`} className="w-full" aspect={i%2===0?'3/4':'4/3'} label={`Memory ${i+1}`} /></div></div>))}</div></div><div className={`lightbox ${lightbox?'active':''}`} onClick={()=>setLightbox(null)}>{lightbox&&(<div className="relative max-w-5xl max-h-[90vh] mx-4"><img src={lightbox} alt="Full view" className="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl" /><button className="absolute -top-12 right-0 text-cream/80 hover:text-cream text-2xl" onClick={()=>setLightbox(null)}>✕</button></div>)}</div></section>);
    };

    // ==========================================
    // CELEBRATE SECTION
    // ==========================================
    const Celebrate = () => {
      const [ref, inView] = useInView();
      const [saidYes, setSaidYes] = useState(false);
      return (<section id="celebrate" className="py-24 bg-gradient-to-b from-beige-light to-beige relative overflow-hidden" ref={ref}><div className="absolute inset-0 bg-[radial-gradient(circle_at_50%_50%,_rgba(248,215,218,0.4)_0%,_transparent_70%)]" /><div className="max-w-3xl mx-auto px-6 relative z-10"><div className={`text-center mb-12 transition-all duration-1000 ${inView?'opacity-100 translate-y-0':'opacity-0 translate-y-8'}`}><span className="text-pink-dark uppercase tracking-[0.3em] text-xs font-serif block mb-4">This Is For You</span><h2 className="font-serif text-4xl md:text-5xl text-wood italic">Will You Celebrate With Me?</h2><div className="w-16 h-px bg-pink mx-auto mt-6 mb-8" /></div><div className={`bg-cream rounded-3xl shadow-2xl shadow-wood/10 border border-pink/20 p-8 md:p-12 transition-all duration-1000 ${inView?'opacity-100 translate-y-0':'opacity-0 translate-y-8'}`} style={{transitionDelay:'200ms'}}>{!saidYes?(<div className="text-center space-y-8"><div className="inline-block bg-beige-light rounded-2xl p-6 border border-chocolate/20"><span className="text-chocolate text-xs uppercase tracking-widest font-serif block mb-2">The Plan</span><h3 className="font-serif text-2xl text-wood mb-2">{CONFIG.celebrationVenue}</h3><p className="font-body text-wood-light text-sm">{CONFIG.celebrationPlan}</p><p className="font-serif text-chocolate mt-3 text-sm">23 September 2026</p></div><button onClick={()=>setSaidYes(true)} className="group relative inline-flex items-center justify-center px-10 py-4 bg-gradient-to-r from-chocolate to-chocolate-dark text-cream font-serif tracking-widest uppercase text-sm rounded-full shadow-lg shadow-chocolate/30 hover:shadow-chocolate/50 transition-all duration-300 hover:scale-105 animate-glow-pulse"><span className="mr-2">Yes, I Will</span><span className="animate-heartbeat">❤️</span></button></div>):(<div className="text-center py-8 animate-scale-in"><div className="w-24 h-24 rounded-full bg-beige-light border-2 border-chocolate flex items-center justify-center mx-auto mb-6 animate-glow-pulse"><span className="text-5xl">💖</span></div><h3 className="font-script text-5xl text-wood mb-4">You Said Yes!</h3><p className="font-serif text-chocolate text-sm tracking-wider uppercase">I love you, {CONFIG.herName}. See you on the 23rd.</p></div>)}</div></div></section>);
    };

    // ==========================================
    // FOOTER SECTION
    // ==========================================
    const Footer = () => (
      <footer className="py-16 bg-wood text-cream/80"><div className="max-w-4xl mx-auto px-6 text-center"><div className="w-16 h-16 mx-auto rounded-full border-2 border-chocolate/60 flex items-center justify-center mb-6 bg-wood-light"><span className="font-script text-3xl text-chocolate mt-1">A&M</span></div><p className="font-serif text-2xl md:text-3xl italic text-cream/90 mb-2">{CONFIG.myName} & {CONFIG.herName}</p><p className="font-serif text-chocolate tracking-widest text-sm uppercase mb-8">Forever & Always</p><div className="w-24 h-px bg-gradient-to-r from-transparent via-chocolate/50 to-transparent mx-auto mb-8" /><p className="font-body italic text-cream/60 text-sm max-w-md mx-auto leading-relaxed">"I made this for you because you are worth every late night, every line of code, and every heartbeat I poured into it."</p><p className="mt-8 text-cream/40 text-xs font-serif tracking-wider">Made with love, by {CONFIG.myName}, for {CONFIG.herName}</p></div></footer>
    );

    // ==========================================
    // APP INITIALIZATION
    // ==========================================
    const App = () => {
      return (
        <div className="relative">
          <FloatingParticles />
          <Hero />
          <Countdown />
          <LoveCounter />
          <OurStory />
          <LoveLetter />
          <Places />
          <Gallery />
          <Celebrate />
          <Footer />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
